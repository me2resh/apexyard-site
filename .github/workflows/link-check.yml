name: Link Check

# Catches link rot in the static site's HTML pages + Markdown alternates.
# lychee is fast + low-noise; runs on PRs, on push to main, and weekly so
# external link rot is caught even when nothing changes.

on:
  pull_request:
    paths:
      - "*.html"
      - "*.md"
      - ".github/workflows/link-check.yml"
  push:
    branches: [main]
    paths:
      - "*.html"
      - "*.md"
  schedule:
    - cron: "0 9 * * 1" # weekly, Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in HTML + Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          # Root HTML pages + Markdown alternates. --no-progress keeps CI logs
          # clean; a non-zero exit fails the job so broken links block merge.
          # --root-dir resolves the site's root-relative links (/favicon.ico,
          # /#quickstart, …) against the repo root. The Netlify clean-URL +
          # rewrite routes (/game → game.html, /foo.md → foo.md.gen) don't
          # exist as local files, so they're excluded — Netlify's own
          # deploy-preview + redirect-rules checks validate that internal
          # routing. me2resh.com (author's blog, up; CI-flaky 301) is excluded.
          # Verified locally: 97 OK / 0 errors / 64 excluded.
          args: >-
            --no-progress
            --verbose
            --max-concurrency 8
            --max-retries 3
            --retry-wait-time 2
            --root-dir "${{ github.workspace }}"
            --exclude "/(game|skills|architecture|how-it-works)(\.md)?$"
            --exclude "/(index|architecture|skills|how-it-works|game)\.md$"
            --exclude "https?://(www\.)?me2resh\.com"
            "*.html"
            "*.md"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
