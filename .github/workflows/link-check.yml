name: Link Check

# Catches link rot in the static site's HTML pages + Markdown alternates.
# lychee is fast + low-noise; runs on PRs, on push to main, and weekly so
# external link rot is caught even when nothing changes.

on:
  pull_request:
    paths:
      - "*.html"
      - "*.md"
      - ".github/workflows/link-check.yml"
  push:
    branches: [main]
    paths:
      - "*.html"
      - "*.md"
  schedule:
    - cron: "0 9 * * 1" # weekly, Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in HTML + Markdown
        uses: lycheeverse/lychee-action@v2
        with:
          # Root HTML pages + Markdown alternates. --no-progress keeps CI logs
          # clean; a non-zero exit fails the job so broken links block merge.
          # Scope to EXTERNAL http(s) links. The site uses Netlify clean URLs +
          # rewrites (/game → game.html, /foo.md → foo.md.gen), which lychee
          # can't resolve against local files ("cannot convert path to URI").
          # Netlify's own deploy-preview + redirect-rules checks validate the
          # internal routing; lychee here catches EXTERNAL link rot, where it's
          # reliable and where rot actually bites.
          #   • --scheme http/https skips local file:// links.
          #   • me2resh.com (author's blog, up; CI-flaky 301) excluded.
          #   • --max-retries absorbs transient external flakiness.
          args: >-
            --no-progress
            --verbose
            --max-concurrency 8
            --max-retries 3
            --retry-wait-time 2
            --scheme https
            --scheme http
            --exclude "https?://(www\.)?me2resh\.com"
            "*.html"
            "*.md"
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
