# Link Check — apexyard-site
#
# Uses lychee to find broken links in root HTML files and all *.md files.
# Private / loopback addresses are excluded; 301/302 redirects accepted.
#
# Fragment checking (--include-fragments) is intentionally omitted:
#   - Same-page nav anchors (href="#move" etc.) are validated by the browser,
#     not by lychee, and have no canonical URL for lychee to resolve.
#   - --base would resolve them against the live domain, which may not yet
#     serve the current build (e.g. during the deploy-config bootstrap PR),
#     causing false failures on anchors that are perfectly valid in the file.
# The --base flag is also omitted for the same reason: root-relative links in
# static HTML are only meaningful once the site is deployed; validating them
# against a not-yet-repointed live domain produces noise, not signal.

name: Link Check

on:
  pull_request:
    paths:
      - "**/*.html"
      - "**/*.md"
      - ".github/workflows/link-check.yml"
  push:
    branches: [main]
    paths:
      - "**/*.html"
      - "**/*.md"
      - ".github/workflows/link-check.yml"
  schedule:
    # Weekly catch for link rot
    - cron: "0 6 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --no-progress
            --exclude-loopback
            --exclude-private
            --accept 200,204,206,301,302,429
            '*.html'
            '**/*.md'
          fail: true
