<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .pad { justify-content: space-between; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 8px;
    max-width: 1010px;
  }
  .chip {
    font-family: var(--font-mono);
    font-size: 27px;
    font-weight: 500;
    padding: 14px 24px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--ink-2);
  }
  .chip.hot {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .chip.soft {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent-line);
  }

  .kicker {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 46px;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .kicker .n { color: var(--accent); }
  .kicker .dim {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 34px;
    color: var(--muted);
    letter-spacing: 0;
  }

  .signoff {
    font-family: var(--font-mono);
    font-size: 24px;
    color: var(--muted);
  }
  .signoff .accent { color: var(--accent); }
</style>
</head>
<body>
<div class="card">
  <div class="pad">
    <div class="eyebrow">
      <span class="brand">~/<span class="ay">apexyard</span> — skills</span>
      <span class="right">slash commands</span>
    </div>

    <div class="chips">
      <span class="chip hot">/setup</span>
      <span class="chip">/handover</span>
      <span class="chip">/write-spec</span>
      <span class="chip soft">/decide</span>
      <span class="chip">/start-ticket</span>
      <span class="chip">/code-review</span>
      <span class="chip hot">/launch-check</span>
      <span class="chip">/migration</span>
      <span class="chip">/approve-merge</span>
      <span class="chip soft">/fan-out</span>
      <span class="chip">/threat-model</span>
      <span class="chip">/status</span>
      <span class="chip">/inbox</span>
      <span class="chip">/update</span>
    </div>

    <div>
      <div class="kicker"><span class="n">{{SKILLS}}</span> skills <span class="dim">— spec to prod, nothing skipped.</span></div>
    </div>

    <div class="signoff">apexyard — <span class="accent">where projects get forged</span></div>
  </div>
</div>
</body>
</html>
