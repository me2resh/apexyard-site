<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- ApexYard favicon — Swiss Graphite AY monogram (Direction A).
       Tokens: white #FFFFFF on accent blue #2F6DF6. Sharp corners. -->
  <rect width="100" height="100" fill="#2F6DF6"/>
  <text x="50" y="52"
        font-family="'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="46" font-weight="700" letter-spacing="-4"
        fill="#FFFFFF" text-anchor="middle" dominant-baseline="central">AY</text>
</svg>
